<!DOCTYPE html>
<html lang="ar" dir="rtl" manifest="cache.appcache">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMODAMER HOST | HOPA & HAKIM</title>
    <style>
        body {
            background: radial-gradient(circle at center, #001a33 0%, #000810 100%);
            color: #ffffff;
            text-align: center;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background: rgba(0, 10, 20, 0.9);
            border: 3px solid #00ffcc;
            border-radius: 20px;
            padding: 15px 25px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.5);
            width: 340px;
        }
        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 5px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        h1 {
            color: #00ffcc;
            font-size: 1.8em;
            margin: 5px 0;
            text-shadow: 0 0 15px #00ffcc, 0 0 25px #00ffcc;
        }
        /* النص المطلوب: PS4 9.00 HACK BY HOPA مع توهج نيون */
        .hopa-hack {
            color: #ffffff;
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            display: block;
        }
        #status {
            color: #ffcc00;
            font-size: 1.1em;
            margin: 10px 0;
            font-weight: bold;
            text-shadow: 0 0 8px #ffcc00;
        }
        .btn {
            background: linear-gradient(45deg, #1d6e2c, #2ea043);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.3em;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(46, 160, 67, 0.6);
            margin-bottom: 10px;
        }
        .footer {
            border-top: 1px solid rgba(0, 255, 204, 0.3);
            padding-top: 10px;
            margin-top: 5px;
        }
        .neon-text {
            color: #00ffcc;
            font-weight: bold;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            display: block;
            font-size: 1.2em;
        }
        .neon-phone {
            color: #ffffff;
            font-size: 1.1em;
            direction: ltr;
            display: block;
            margin-bottom: 8px;
            text-shadow: 0 0 5px #00ffcc;
        }
        .service-tag {
            color: #888;
            font-size: 0.75em;
            margin: 5px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.jpg" alt="ALMODAMER" class="logo">
        
        <h1>المدمر | ALMODAMER</h1>
        
        <span class="hopa-hack">PS4 9.00 HACK BY HOPA</span>
        
        <div id="status">جاهز للتفعيل | Ready</div>
        
        <button class="btn" onclick="startExploit()">تشغيل GOLDHEN | START</button>
        
        <div class="footer">
            <span class="neon-text">هوبا | HOPA</span>
            <span class="neon-phone">0942578649</span>
            
            <span class="neon-text">حكيم | HAKIM</span>
            <span class="neon-phone">0925483921</span>
            
            <p class="service-tag">مركز صيانة وتحميل الألعاب</p>
        </div>
    </div>

    <script type="module">
        import { psfree } from './psfree.mjs';
        window.startExploit = async function() {
            const statusBox = document.getElementById('status');
            statusBox.innerHTML = "جاري التفعيل...";
            try { await psfree(); } catch (e) {
                statusBox.innerHTML = "فشل! أعد المحاولة";
                statusBox.style.color = "#ff4d4d";
            }
        };
        window.applicationCache.addEventListener('cached', () => {
            document.getElementById('status').innerHTML = "تم الحفظ أوفلاين | Offline Ready";
        }, false);
    </script>
</body>
</html>
